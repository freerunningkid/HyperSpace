# HyperSpace 路由规则 —— 廉价规则, 零 token 成本
# Router 在 auto 模式下据此判定任务复杂度, 选 tier

# 判定「复杂」的信号 (命中任一即视为复杂 → 走 cheap_capable)
complexity:
  # 代码标记: 出现三反引号围栏 / 函数定义 / 类定义 / 明显代码关键词
  code_markers:
    - "```"
    - "def "
    - "class "
    - "function "
    - "import "
    - "return "
  # 复杂任务关键词 (中英)
  complex_keywords:
    - "重构"
    - "refactor"
    - "实现"
    - "implement"
    - "调试"
    - "debug"
    - "分析"
    - "analyze"
    - "多步"
    - "架构"
    - "architect"
  # prompt 长度阈值 (字符数, 超过则视为复杂)
  length_threshold: 800

# 升档链: 某 tier 全部候选失败后, 按此顺序向上升级
escalation_chain:
  - free_text
  - free_vision
  - cheap_capable
  - premium
