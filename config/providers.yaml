# HyperSpace Provider 注册表 —— tier → 有序候选 provider 列表
# Router 只选 tier, 具体 provider/model 在此配置; 厂商改价/改名时改这里, 不动代码
# 每条候选: { provider, base_url, model, key_env (读取的环境变量名) }
# 执行时同 tier 候选依次尝试, 失败(限流/网络/鉴权)则跳下一候选, 全失败则升一档

free_text:
  # 免费文本档: GLM-4.7-Flash (智谱, 免费, 200K)
  - { provider: zhipu, base_url: "https://open.bigmodel.cn/api/paas/v4/", model: "glm-4.7-flash", key_env: "ZHIPU_API_KEY" }

free_vision:
  # 免费识图档: GLM-4.6V-Flash (智谱, 免费图像理解)
  - { provider: zhipu, base_url: "https://open.bigmodel.cn/api/paas/v4/", model: "glm-4.6v-flash", key_env: "ZHIPU_API_KEY" }

cheap_capable:
  # 廉价能力档: 复杂推理/编码, 非免费但极便宜
  - { provider: deepseek, base_url: "https://api.deepseek.com", model: "deepseek-chat", key_env: "DEEPSEEK_API_KEY" }
  # 长上下文备选
  - { provider: kimi, base_url: "https://api.moonshot.cn/v1", model: "moonshot-v1-32k", key_env: "MOONSHOT_API_KEY" }

premium:
  # 高精度档 (可选, 仅留配置位; key 未配置时自动跳过)
  - { provider: openrouter, base_url: "https://openrouter.ai/api/v1", model: "anthropic/claude-3.5-sonnet", key_env: "OPENROUTER_API_KEY" }
