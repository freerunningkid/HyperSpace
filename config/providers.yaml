# HyperSpace 多 Provider 注册表 v2.0
# 所有 API Key 通过环境变量读取，不在此文件中写入任何真实密钥
# 参考 .env.example 了解需要配置哪些环境变量

providers:

  # ═══════════════════════════════════════════════════════════════
  # Web Provider（原生网页端）
  # ═══════════════════════════════════════════════════════════════

  deepseek_web:
    type: web
    enabled: true
    cost_tier: free
    fallback_to: deepseek_api
    capabilities:
      text: true
      vision_understanding: true
      file_upload: true
      web_search: true
      streaming: true
      structured_output: false
      planning: true
      long_context: true

  # ═══════════════════════════════════════════════════════════════
  # API Provider（OpenAI 兼容端点）
  # ═══════════════════════════════════════════════════════════════

  deepseek_api:
    type: api
    provider_name: deepseek
    base_url: https://api.deepseek.com
    model: deepseek-chat
    key_env: DEEPSEEK_API_KEY
    cost_tier: low_cost
    fallback_to: zhipu_api
    capabilities:
      text: true
      streaming: true
      structured_output: true
      planning: true
      long_context: true

  zhipu_api:
    type: api
    provider_name: zhipu
    base_url: https://open.bigmodel.cn/api/paas/v4
    model: glm-4.7-flash
    key_env: ZHIPU_API_KEY
    cost_tier: free
    capabilities:
      text: true
      streaming: true
      structured_output: true
      planning: true

  qwen_api:
    type: api
    provider_name: qwen
    base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
    model: qwen-plus
    key_env: QWEN_API_KEY
    cost_tier: low_cost
    capabilities:
      text: true
      vision_understanding: true
      streaming: true
      structured_output: true
      planning: true

  siliconflow_nex_n2_pro:
    type: api
    provider_name: siliconflow
    base_url: https://api.siliconflow.cn/v1
    model: nex-agi/Nex-N2-Pro
    key_env: SILICONFLOW_API_KEY
    cost_tier: free
    capabilities:
      text: true
      streaming: true
      structured_output: true
      planning: true

  agnes_text:
    type: api
    provider_name: agnes
    base_url: https://apihub.agnes-ai.com/v1
    model: agnes-2.0-flash
    key_env: AGNES_API_KEY
    cost_tier: free
    capabilities:
      text: true
      streaming: true
      structured_output: true
      planning: true

  agnes_image:
    type: api
    provider_name: agnes
    base_url: https://apihub.agnes-ai.com/v1
    model: agnes-image-2.1-flash
    key_env: AGNES_API_KEY
    cost_tier: free
    capabilities:
      text: true
      vision_understanding: true
      image_generation: true
      streaming: false
      structured_output: true
      planning: false

  agnes_video:
    type: api
    provider_name: agnes
    base_url: https://apihub.agnes-ai.com/v1
    model: agnes-video-v2.0
    key_env: AGNES_API_KEY
    cost_tier: free
    capabilities:
      video_understanding: true
      video_generation: true
      streaming: false
      structured_output: false
      planning: false

  # ═══════════════════════════════════════════════════════════════
  # Placeholder Web Provider（占位，Web 自动化未实现）
  # ═══════════════════════════════════════════════════════════════

  chatglm_web:
    type: placeholder_web
    enabled: true
    fallback_to: agnes_text
    cost_tier: free
    capabilities:
      text: true
      planning: true
      long_context: true

  qwen_chat_web:
    type: placeholder_web
    enabled: true
    fallback_to: qwen_api
    cost_tier: free
    capabilities:
      text: true
      planning: true
      long_context: true
