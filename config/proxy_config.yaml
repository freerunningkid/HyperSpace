# HyperSpace 代理模式配置
# 启动: python -m hyperspace.proxy_server
# 然后 Claude Code 设置 ANTHROPIC_BASE_URL=http://localhost:9090

# 监听地址
host: "127.0.0.1"
port: 9090

# 模型路由表
# type: anthropic_compat = 透传（Anthropic 格式）
#       openai_compat    = 转换（OpenAI 格式 → Anthropic 格式）
models:
  # ── DeepSeek (Anthropic 兼容，直接透传) ──
  deepseek-v4-flash:
    provider: deepseek
    type: anthropic_compat
    base_url: "https://api.deepseek.com/anthropic"
    api_key_env: "ANTHROPIC_AUTH_TOKEN"
    notes: "当前主模型"

  deepseek-v4-pro:
    provider: deepseek
    type: anthropic_compat
    base_url: "https://api.deepseek.com/anthropic"
    api_key_env: "ANTHROPIC_AUTH_TOKEN"
    notes: "DeepSeek 长上下文版本"

  # ── SiliconFlow (OpenAI 兼容，需格式转换) ──
  nex-n2-pro:
    provider: siliconflow
    type: openai_compat
    base_url: "https://api.siliconflow.cn/v1"
    model: "nex-agi/Nex-N2-Pro"
    api_key_env: "SILICONFLOW_API_KEY"
    max_tokens: 8192
    notes: "硅基流动 Nex-N2-Pro（无斜杠，Claude Code 兼容）"
