[permissions]
allow = ["Bash(Write-Host \"=== 1. Current settings.json ===\"\n$s = Get-Content \"C:\\Users\\KID\\.claude\\settings.json\" -Encoding utf8 | ConvertFrom-Json\nWrite-Host \"model: $($s.model)\"\nWrite-Host \"ANTHROPIC_BASE_URL: $($s.env.ANTHROPIC_BASE_URL)\"\nWrite-Host \"ANTHROPIC_MODEL: $($s.env.ANTHROPIC_MODEL)\"\nWrite-Host \"ANTHROPIC_AUTH_TOKEN prefix: $($s.env.ANTHROPIC_AUTH_TOKEN.Substring(0,15))...\"\n\nWrite-Host \"`n=== 2. Daemon status ===\"\nGet-Process -Name \"node\" -ErrorAction SilentlyContinue | Where-Object { $_.CommandLine -match \"claude\" } | ForEach-Object { Write-Host \"Claude Code daemon running: PID $($_.Id)\" }\nif (-not $?) { Write-Host \"No Claude Code daemon running\" }\n\nWrite-Host \"`n=== 3. Test Agnes API ===\"\n$key = $s.env.ANTHROPIC_AUTH_TOKEN\n$body = @{model=\"agnes-2.0-flash\"; max_tokens=20; messages=@(@{role=\"user\"; content=\"Hi\"})} | ConvertTo-Json -Compress\n$r = curl.exe -s -X POST \"https://apihub.agnes-ai.com/v1/messages\" -H \"x-api-key: $key\" -H \"anthropic-version: 2023-06-01\" -H \"Content-Type: application/json\" -d $body\nWrite-Host $r)", "Bash(Write-Host \"=== Check daemon more carefully ===\"\nGet-Process -Name \"node\" -ErrorAction SilentlyContinue | Select-Object Id, ProcessName, CommandLine\nif ($?) { Write-Host \"(no claude processes)\" }\n\nWrite-Host \"`n=== Check for project-level override ===\"\nTest-Path \"D:\\Reasonix\\.claude.json\"\nTest-Path \"D:\\Reasonix\\.claude.jsonc\"\n\nWrite-Host \"`n=== Check roster.json ===\"\n$rosterPath = \"C:\\Users\\KID\\.claude\\daemon\\roster.json\"\nif (Test-Path $rosterPath) {\n    $r = Get-Content $rosterPath -Encoding utf8 | ConvertFrom-Json\n    Write-Host \"Supervisor PID: $($r.supervisorPid)\"\n    if ($r.workers) {\n        $r.workers.PSObject.Properties | ForEach-Object {\n            Write-Host \"Worker: $($_.Value.sessionId) | model=$($_.Value.dispatch.env.ANTHROPIC_MODEL)\"\n        }\n    } else { Write-Host \"No workers\" }\n} else { Write-Host \"No roster.json\" })", "Bash(Write-Host \"=== Check daemon lock and stale state ===\"\n$lockPath = \"C:\\Users\\KID\\.claude\\daemon.lock\"\nif (Test-Path $lockPath) {\n    $lock = Get-Content $lockPath -Encoding utf8\n    Write-Host \"daemon.lock: $lock\"\n} else { Write-Host \"daemon.lock: not found\" }\n\nWrite-Host \"`n=== daemon.status.json ===\"\n$statusPath = \"C:\\Users\\KID\\.claude\\daemon.status.json\"\nif (Test-Path $statusPath) {\n    Get-Content $statusPath -Encoding utf8\n} else { Write-Host \"not found\" }\n\nWrite-Host \"`n=== Check settings.json model field ===\"\n$s = Get-Content \"C:\\Users\\KID\\.claude\\settings.json\" -Encoding utf8 | ConvertFrom-Json\nWrite-Host \"model = '$($s.model)'\"\nWrite-Host \"ANTHROPIC_MODEL = '$($s.env.ANTHROPIC_MODEL)'\"\nWrite-Host \"env.ANTHROPIC_AUTH_TOKEN starts with: $($s.env.ANTHROPIC_AUTH_TOKEN.Substring(0,15))...\"\n\nWrite-Host \"`n=== Check if daemon supervisor is actually alive ===\"\n$spid = (Get-Content \"C:\\Users\\KID\\.claude\\daemon\\roster.json\" -Encoding utf8 | ConvertFrom-Json).supervisorPid\nWrite-Host \"roster.json says supervisor PID: $spid\"\n$proc = Get-Process -Id $spid -ErrorAction SilentlyContinue\nif ($proc) {\n    Write-Host \"⚠️ Supervisor process STILL RUNNING (PID $spid)\"\n} else {\n    Write-Host \"✅ Supervisor not running (roster.json is stale)\"\n})", "Bash($key=\"sk-Z4t3227HWe4gEEPwNgwKd5mat0MREcCtjaKfVh2LXLNVKnMl\"\n\nWrite-Host \"=== Test 1: Full Anthropic request (with system + metadata) ===\"\n$body1 = @{\n    model=\"agnes-2.0-flash\"\n    max_tokens=100\n    system=\"You are a helpful assistant.\"\n    messages = @(\n        @{role=\"user\"; content=\"Say hello in 3 words\"}\n    )\n    metadata = @{user_id=\"test\"}\n} | ConvertTo-Json -Depth 10 -Compress\n\n$r1 = curl.exe -s -X POST \"https://apihub.agnes-ai.com/v1/messages\" -H \"x-api-key: $key\" -H \"anthropic-version: 2023-06-01\" -H \"Content-Type: application/json\" -d $body1\nWrite-Host \"Status: $((ConvertFrom-Json $r1).type)\"\nWrite-Host $r1\n\nWrite-Host \"`n=== Test 2: Streaming with full payload ===\"\n$body2 = @{\n    model=\"agnes-2.0-flash\"\n    max_tokens=50\n    stream=$true\n    messages = @(@{role=\"user\"; content=\"Count 1 2 3\"})\n} | ConvertTo-Json -Depth 10 -Compress\n\n$r2 = curl.exe -s -N -X POST \"https://apihub.agnes-ai.com/v1/messages\" -H \"x-api-key: $key\" -H \"anthropic-version: 2023-06-01\" -H \"Content-Type: application/json\" -d $body2 2>&1\nWrite-Host \"First event:\"\n$r2 -split \"`n\" | Select-Object -First 4\nWrite-Host \"...\"\n$r2 -split \"`n\" | Select-Object -Last 4\n\nWrite-Host \"`n=== Test 3: Verify /v1/models listing ===\"\n$r3 = curl.exe -s -X GET \"https://apihub.agnes-ai.com/v1/models\" -H \"x-api-key: $key\" | ConvertFrom-Json\n$r3.data | Select-Object id, object | Format-Table -AutoSize)", "Bash($key=\"sk-Z4t3227HWe4gEEPwNgwKd5mat0MREcCtjaKfVh2LXLNVKnMl\"\n\nWrite-Host \"=== Test: Double /v1/v1/messages (possible Claude Code URL construction) ===\"\n$body = @{model=\"agnes-2.0-flash\"; max_tokens=10; messages=@(@{role=\"user\"; content=\"hi\"})} | ConvertTo-Json -Compress\n$r = curl.exe -s -X POST \"https://apihub.agnes-ai.com/v1/v1/messages\" -H \"x-api-key: $key\" -H \"anthropic-version: 2023-06-01\" -H \"Content-Type: application/json\" -d $body\n$r | ConvertFrom-Json | ConvertTo-Json -Compress\n\nWrite-Host \"`n=== Test: GET /v1/messages? (query params) ===\"\n$r2 = curl.exe -s -X GET \"https://apihub.agnes-ai.com/v1/messages?test=1\" -H \"x-api-key: $key\" 2>&1 | Select-Object -First 3\n$r2\n\nWrite-Host \"`n=== Test: What happens with metadata.user_id causing issues? ===\"\n# Claude Code sends metadata in some versions\n$body3 = @{\n    model=\"agnes-2.0-flash\"\n    max_tokens=10\n    messages=@(@{role=\"user\"; content=\"hi\"})\n    metadata=@{}\n} | ConvertTo-Json -Compress\n$r3 = curl.exe -s -X POST \"https://apihub.agnes-ai.com/v1/messages\" -H \"x-api-key: $key\" -H \"anthropic-version: 2023-06-01\" -H \"Content-Type: application/json\" -d $body3\nWrite-Host $r3\n\nWrite-Host \"`n=== Test: Extra headers Claude Code might send ===\"\n$r4 = curl.exe -s -X POST \"https://apihub.agnes-ai.com/v1/messages\" -H \"x-api-key: $key\" -H \"anthropic-version: 2023-06-01\" -H \"Content-Type: application/json\" -H \"Accept: text/event-stream\" -H \"Accept-Language: en\" -H \"User-Agent: ClaudeCode/2.1.186\" -d $body\nWrite-Host $r4)"]
