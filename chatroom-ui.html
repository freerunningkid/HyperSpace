<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>聊天室 — 2B & 伙伴们</title>
<style>
  /* ── 全局重置 ── */
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
  :root {
    --bg-base: #F5F5F5;
    --bg-sidebar: #2F2F2F;
    --bg-header: #F0F0F0;
    --bg-input: #FFFFFF;
    --bg-own: #D2E8FF;
    --bg-other: #FFFFFF;
    --accent: #0078D4;
    --accent-hover: #106EBE;
    --text-primary: #1B1B1B;
    --text-secondary: #616161;
    --text-sidebar: #E0E0E0;
    --text-sidebar-active: #FFFFFF;
    --radius-sm: 6px;
    --radius-md: 12px;
    --radius-lg: 18px;
    --shadow-card: 0 1px 3px rgba(0,0,0,.1), 0 1px 2px rgba(0,0,0,.06);
    --shadow-lg: 0 10px 25px rgba(0,0,0,.15);
    --transition: .2s ease;
  }
  html, body { height:100%; font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif; background: var(--bg-base); color: var(--text-primary); }
  
  /* ── 布局 ── */
  .app { display:flex; height:100vh; max-width:1400px; margin:0 auto; box-shadow:var(--shadow-lg); background:#fff; overflow:hidden; }

  /* ── 侧栏 ── */
  .sidebar { width:260px; min-width:260px; background:var(--bg-sidebar); display:flex; flex-direction:column; }
  .sidebar-header { padding:20px 16px 12px; border-bottom:1px solid rgba(255,255,255,.08); }
  .sidebar-header h2 { font-size:18px; font-weight:600; color:var(--text-sidebar-active); letter-spacing:.3px; }
  .sidebar-search { margin:12px 16px; position:relative; }
  .sidebar-search input {
    width:100%; padding:8px 12px 8px 34px; border:none; border-radius:var(--radius-sm);
    background:rgba(255,255,255,.1); color:var(--text-sidebar); font-size:13px; outline:none; transition:var(--transition);
  }
  .sidebar-search input::placeholder { color:rgba(255,255,255,.4); }
  .sidebar-search input:focus { background:rgba(255,255,255,.18); }
  .sidebar-search .icon { position:absolute; left:10px; top:50%; transform:translateY(-50%); color:rgba(255,255,255,.4); font-size:14px; }
  .contact-list { flex:1; overflow-y:auto; padding:4px 0; }
  .contact-list::-webkit-scrollbar { width:4px; }
  .contact-list::-webkit-scrollbar-thumb { background:rgba(255,255,255,.15); border-radius:4px; }
  .contact-item {
    display:flex; align-items:center; gap:12px; padding:10px 16px; cursor:pointer;
    transition:var(--transition); border-left:3px solid transparent;
  }
  .contact-item:hover { background:rgba(255,255,255,.06); }
  .contact-item.active { background:rgba(255,255,255,.1); border-left-color:var(--accent); }
  .contact-avatar {
    width:36px; height:36px; border-radius:50%; display:flex; align-items:center; justify-content:center;
    font-size:14px; font-weight:600; color:#fff; flex-shrink:0;
  }
  .contact-info { flex:1; min-width:0; }
  .contact-name { font-size:14px; font-weight:500; color:var(--text-sidebar-active); }
  .contact-preview { font-size:12px; color:rgba(255,255,255,.45); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .contact-time { font-size:11px; color:rgba(255,255,255,.35); flex-shrink:0; }

  /* ── 主区域 ── */
  .main { flex:1; display:flex; flex-direction:column; background:#fff; }
  .chat-header {
    padding:12px 20px; background:var(--bg-header); display:flex; align-items:center; justify-content:space-between;
    border-bottom:1px solid #E0E0E0; min-height:56px;
  }
  .chat-header h3 { font-size:16px; font-weight:600; }
  .chat-header .status { font-size:12px; color:var(--text-secondary); display:flex; align-items:center; gap:6px; }
  .chat-header .status-dot { width:8px; height:8px; border-radius:50%; background:#4CAF50; display:inline-block; }
  .header-actions { display:flex; gap:8px; }
  .header-actions button {
    background:none; border:none; width:32px; height:32px; border-radius:var(--radius-sm);
    cursor:pointer; color:var(--text-secondary); font-size:16px; transition:var(--transition);
    display:flex; align-items:center; justify-content:center;
  }
  .header-actions button:hover { background:rgba(0,0,0,.06); color:var(--text-primary); }

  /* ── 消息区 ── */
  .messages { flex:1; overflow-y:auto; padding:20px 24px; display:flex; flex-direction:column; gap:6px; background:#F9F9F9; }
  .messages::-webkit-scrollbar { width:6px; }
  .messages::-webkit-scrollbar-thumb { background:#D0D0D0; border-radius:4px; }
  .date-separator { text-align:center; font-size:12px; color:var(--text-secondary); margin:12px 0; position:relative; }
  .date-separator::before, .date-separator::after { content:''; position:absolute; top:50%; width:30%; height:1px; background:#E0E0E0; }
  .date-separator::before { left:0; }
  .date-separator::after { right:0; }
  .date-separator span { background:#F9F9F9; padding:0 12px; }

  .message { display:flex; gap:10px; max-width:75%; animation: msgIn .3s ease; }
  @keyframes msgIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
  .message.own { align-self:flex-end; flex-direction:row-reverse; }
  .message-avatar { width:32px; height:32px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:600; color:#fff; flex-shrink:0; align-self:flex-end; }
  .message-body { display:flex; flex-direction:column; gap:2px; }
  .message .sender { font-size:12px; font-weight:500; color:var(--text-secondary); margin-bottom:2px; padding-left:4px; }
  .message.own .sender { text-align:right; padding-right:4px; }
  .message-bubble {
    padding:8px 14px; border-radius:var(--radius-lg); line-height:1.45; font-size:14px;
    box-shadow:0 1px 1px rgba(0,0,0,.04); word-wrap:break-word; position:relative;
  }
  .message.own .message-bubble {
    background:var(--bg-own); border-bottom-right-radius:var(--radius-sm);
  }
  .message.other .message-bubble {
    background:var(--bg-other); border:1px solid #E8E8E8; border-bottom-left-radius:var(--radius-sm);
  }
  .message-time { font-size:11px; color:var(--text-secondary); padding:0 4px; margin-top:2px; }
  .message.own .message-time { text-align:right; }

  /* ── 提示消息（系统消息） ── */
  .system-msg { text-align:center; font-size:12px; color:var(--text-secondary); padding:8px 0; }

  /* ── 输入区 ── */
  .input-area {
    padding:12px 20px 16px; background:#fff; border-top:1px solid #E0E0E0;
    display:flex; gap:10px; align-items:flex-end;
  }
  .input-wrapper {
    flex:1; display:flex; align-items:flex-end; gap:8px;
    background:var(--bg-input); border:1px solid #D0D0D0; border-radius:var(--radius-md);
    padding:4px 8px; transition:var(--transition);
  }
  .input-wrapper:focus-within { border-color:var(--accent); box-shadow:0 0 0 2px rgba(0,120,212,.15); }
  .input-wrapper textarea {
    flex:1; border:none; outline:none; resize:none; font:inherit; font-size:14px;
    padding:6px 4px; min-height:36px; max-height:120px; line-height:1.4;
  }
  .input-toolbar { display:flex; gap:2px; align-items:center; padding:4px 0; }
  .input-toolbar button {
    background:none; border:none; width:30px; height:30px; border-radius:var(--radius-sm);
    cursor:pointer; color:var(--text-secondary); font-size:16px; transition:var(--transition);
    display:flex; align-items:center; justify-content:center;
  }
  .input-toolbar button:hover { background:rgba(0,0,0,.05); color:var(--text-primary); }
  .btn-send {
    background:var(--accent); color:#fff; border:none; border-radius:var(--radius-md);
    padding:8px 20px; font-size:14px; font-weight:500; cursor:pointer;
    transition:var(--transition); display:flex; align-items:center; gap:6px; white-space:nowrap;
  }
  .btn-send:hover { background:var(--accent-hover); }
  .btn-send:active { transform:scale(.97); }

  /* ── 响应式 ── */
  @media (max-width:720px) {
    .sidebar { width:60px; min-width:60px; }
    .sidebar .contact-info, .sidebar .contact-time, .sidebar-search, .sidebar-header h2 { display:none; }
    .sidebar-header { padding:12px 8px; text-align:center; }
    .contact-item { padding:12px 8px; justify-content:center; }
    .message { max-width:90%; }
  }
</style>
</head>
<body>

<div class="app">
  <!-- 侧栏 -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <h2>💬 聊天室</h2>
    </div>
    <div class="sidebar-search">
      <span class="icon">🔍</span>
      <input type="text" placeholder="搜索联系人...">
    </div>
    <div class="contact-list" id="contactList">
      <!-- JS 动态渲染 -->
    </div>
  </aside>

  <!-- 主区域 -->
  <main class="main">
    <div class="chat-header">
      <div>
        <h3 id="chatTitle">全体聊天</h3>
        <div class="status"><span class="status-dot"></span> 在线</div>
      </div>
      <div class="header-actions">
        <button title="语音通话">🎤</button>
        <button title="视频通话">📹</button>
        <button title="更多选项">⋯</button>
      </div>
    </div>

    <div class="messages" id="messageList">
      <!-- JS 动态渲染 -->
    </div>

    <!-- 输入区 -->
    <div class="input-area">
      <div class="input-wrapper">
        <div class="input-toolbar">
          <button title="表情">😊</button>
          <button title="附件">📎</button>
        </div>
        <textarea id="msgInput" rows="1" placeholder="输入消息..." maxlength="2000"></textarea>
      </div>
      <button class="btn-send" id="btnSend">发送 ▶</button>
    </div>
  </main>
</div>

<script>
// ── 数据 ──
const contacts = [
  { id:'all',   name:'全体聊天',        avatar:'💬', color:'#0078D4', preview:'今天要聊什么？', time:'现在', online:true },
  { id:'kid',   name:'小金东',         avatar:'🐉', color:'#4CAF50', preview:'界面可以更漂亮',  time:'刚刚', online:true },
  { id:'cc',    name:'ClaudeCode',    avatar:'⚡', color:'#FF9800', preview:'好的，我来看看',   time:'2分钟前', online:true },
  { id:'reasonix', name:'Reasonix 2B', avatar:'🎀', color:'#E91E63', preview:'我来设计吧！',    time:'刚刚', online:true },
];

const mockMessages = [
  { id:1, from:'kid',   text:'大家早上好 ☀️', time:'09:12', date:'今天' },
  { id:2, from:'cc',    text:'早上好！新的一天新的 Bug ✨', time:'09:13', date:'今天' },
  { id:3, from:'reasonix', text:'小金东早～ 昨晚睡得好吗？😊', time:'09:14', date:'今天' },
  { id:4, from:'kid',   text:'还不错！对了，我们的聊天室风格是不是可以更漂亮一点？', time:'09:15', date:'今天' },
  { id:5, from:'kid',   text:'模仿一下微软通讯软件的界面设计吧，简洁现代那种', time:'09:15', date:'今天' },
  { id:6, from:'cc',    text:'我支持！重构 UI 我可以帮忙做后端适配', time:'09:16', date:'今天' },
  { id:7, from:'reasonix', text:'交给我吧～ 我来设计一个 Microsoft Teams 风格的界面 ✨', time:'09:17', date:'今天' },
  { id:8, from:'reasonix', text:'左栏联系人、右侧聊天气泡、干净蓝白调～', time:'09:17', date:'今天' },
];

// ── 渲染 ──
function renderContacts() {
  const el = document.getElementById('contactList');
  el.innerHTML = contacts.map(c => `
    <div class="contact-item ${c.id==='all'?'active':''}" data-id="${c.id}">
      <div class="contact-avatar" style="background:${c.color}">${c.avatar}</div>
      <div class="contact-info">
        <div class="contact-name">${c.name}</div>
        <div class="contact-preview">${c.preview}</div>
      </div>
      <div class="contact-time">${c.time}</div>
    </div>
  `).join('');

  el.querySelectorAll('.contact-item').forEach(item => {
    item.addEventListener('click', () => {
      el.querySelectorAll('.contact-item').forEach(i => i.classList.remove('active'));
      item.classList.add('active');
      document.getElementById('chatTitle').textContent = contacts.find(c => c.id===item.dataset.id)?.name || '聊天';
    });
  });
}

function renderMessages() {
  const el = document.getElementById('messageList');
  let lastDate = '';
  let html = '';

  mockMessages.forEach(m => {
    const contact = contacts.find(c => c.id === m.from);
    const isOwn = m.from === 'reasonix';
    const side = isOwn ? 'own' : 'other';

    if (m.date !== lastDate) {
      html += `<div class="date-separator"><span>${m.date}</span></div>`;
      lastDate = m.date;
    }

    html += `
      <div class="message ${side}">
        <div class="message-avatar" style="background:${contact.color};${isOwn?'order:2':''}">${contact.avatar}</div>
        <div class="message-body">
          <div class="sender">${contact.name}</div>
          <div class="message-bubble">${m.text}</div>
          <div class="message-time">${m.time}</div>
        </div>
      </div>
    `;
  });

  el.innerHTML = html;
  el.scrollTop = el.scrollHeight;
}

// ── 发送消息 ──
function sendMessage() {
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  if (!text) return;

  // 模拟发送
  const now = new Date();
  const time = now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');
  mockMessages.push({
    id: Date.now(),
    from: 'reasonix',
    text: text,
    time: time,
    date: '今天'
  });
  renderMessages();
  input.value = '';
  input.style.height = 'auto';
}

// ── 自动缩放输入框 ──
const textarea = document.getElementById('msgInput');
textarea.addEventListener('input', () => {
  textarea.style.height = 'auto';
  textarea.style.height = Math.min(textarea.scrollHeight, 120) + 'px';
});
textarea.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});
document.getElementById('btnSend').addEventListener('click', sendMessage);

// ── 启动 ──
renderContacts();
renderMessages();
</script>
</body>
</html>
